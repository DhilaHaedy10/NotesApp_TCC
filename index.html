<!doctype html>
<html>
  <head>
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header class="header">
      <h1>Notes App</h1>
    </header>

    <!-- CONTENT -->
    <main class="container">
      <div class="notes" id="list"></div>
    </main>

    <!-- BUTTON TAMBAH (PERSEGI) -->
    <button class="fab" onclick="openModal()">+ Tambah Catatan</button>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Tambah Catatan</h3>
          <button onclick="closeModal()">✖</button>
        </div>

        <input id="judul" placeholder="Judul..." />
        <textarea id="isi" placeholder="Tulis sesuatu..."></textarea>

        <button class="save-btn" onclick="saveNote()">Simpan</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
