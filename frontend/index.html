<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css?v=3" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body>
    <div id="app" v-cloak>
      <!-- HEADER -->
      <header class="header">
        <h1>Notes App</h1>
      </header>

      <!-- CONTENT -->
      <main class="container">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Daftar Catatan</p>
            <h2>{{ notes.length }} Catatan</h2>
          </div>
          <button class="primary-btn" type="button" @click="openModal">+ Tambah</button>
        </div>

        <div class="notes" id="list">
          <div class="card" v-for="note in notes" :key="note.id">
            <div class="card-header">
              <div>
                <div class="card-title">{{ note.judul }}</div>
                <div class="card-date">{{ formatDate(note.createdAt) }}</div>
              </div>
            </div>

            <p class="card-preview">{{ note.isi }}</p>

            <div class="card-actions">
              <button class="view-full-btn" type="button" @click="viewNote(note)">Lihat catatan</button>
              <div class="secondary-actions">
                <button class="action-btn edit" type="button" @click="editNote(note)">Edit</button>
                <button class="action-btn delete" type="button" @click="deleteNote(note.id)">Hapus</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- BUTTON TAMBAH (PERSEGI) -->
      <button class="fab" :class="{ center: notes.length === 0 }" type="button" @click="openModal">
        + Tambah Catatan
      </button>

      <!-- MODAL -->
      <div class="modal" v-if="isModalOpen">
        <div class="modal-content">
          <div class="modal-header">
            <h3>{{ modalTitle }}</h3>
            <button type="button" @click="closeModal">X</button>
          </div>

          <input v-model="form.judul" placeholder="Judul..." />
          <textarea v-model="form.isi" placeholder="Tulis sesuatu..."></textarea>

          <button class="save-btn" type="button" @click="saveNote">Simpan</button>
        </div>
      </div>

      <!-- DETAIL MODAL -->
      <div class="modal" v-if="selectedNote">
        <div class="modal-content detail-modal">
          <div class="modal-header">
            <div>
              <p class="eyebrow">Detail Catatan</p>
              <h3>{{ selectedNote.judul }}</h3>
            </div>
            <button type="button" @click="closeDetail">X</button>
          </div>

          <div class="detail-date">{{ formatDate(selectedNote.createdAt) }}</div>
          <p class="detail-text">{{ selectedNote.isi }}</p>

          <div class="detail-actions">
            <button class="action-btn edit" type="button" @click="editFromDetail">Edit</button>
            <button class="action-btn delete" type="button" @click="deleteFromDetail">Hapus</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js?v=3"></script>
  </body>
</html>
