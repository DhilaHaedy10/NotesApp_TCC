runtime: nodejs22

handlers:
  - url: /script.js
    static_files: script.js
    upload: script.js
    http_headers:
      Cache-Control: no-cache

  - url: /style.css
    static_files: style.css
    upload: style.css
    http_headers:
      Cache-Control: no-cache

  - url: /.*
    static_files: index.html
    upload: index.html
    http_headers:
      Cache-Control: no-cache
